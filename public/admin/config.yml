backend:
  name: github
  repo: ChandanShakya/metalhub-astro
  branch: main
  base_url: https://sveltia-cms-auth.metalhub-np.workers.dev/

media_folder: "public/images/products"
public_folder: "/images/products"

collections:
  - name: materials
    label: Materials
    folder: src/content/materials
    create: true
    fields:
      - label: Name
        name: name
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Nepali, name: ne, widget: string }
          - { label: Newari, name: newa, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Icon, name: icon, widget: string, default: "🔩" }
      - { label: Order, name: order, widget: number, default: 0 }

  - name: categories
    label: Categories
    folder: src/content/categories
    create: true
    fields:
      - label: Name
        name: name
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Nepali, name: ne, widget: string }
          - { label: Newari, name: newa, widget: string }
      - { label: Slug, name: slug, widget: string }
      - {
          label: Icon,
          name: icon,
          widget: string,
          default: "📦",
          hint: "An emoji to represent this category",
        }
      - {
          label: Order,
          name: order,
          widget: number,
          default: 0,
          hint: "Lower numbers appear first",
        }
      - { label: Image, name: image, widget: image, required: false, hint: "Category banner image for homepage" }
      - label: Description
        name: description
        widget: object
        required: false
        fields:
          - { label: English, name: en, widget: string }
          - { label: Nepali, name: ne, widget: string }
          - { label: Newari, name: newa, widget: string }
      - { label: Promoted (show in Hot Topics), name: promoted, widget: boolean, default: false }

  - name: products
    label: Products
    folder: src/content/products
    create: true
    fields:
      - label: Name
        name: name
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Nepali, name: ne, widget: string }
          - { label: Newari, name: newa, widget: string }
      - { label: Slug, name: slug, widget: string }
      - label: Description
        name: description
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Nepali, name: ne, widget: string }
          - { label: Newari, name: newa, widget: string }
      - {
          label: Category,
          name: category,
          widget: string,
          hint: "Functional category slug (kitchenware, puja-items, home-decor, gift-items, statue, corporate-gifts)",
        }
      - { label: Material, name: material, widget: string, hint: "Material slug (copper, brass, bronze)" }
      - {
          label: Images,
          name: images,
          widget: list,
          field: { name: image, widget: image },
        }
      - { label: Base Price (NPR), name: basePrice, widget: number }
      - { label: Stock, name: stock, widget: number, min: 0, default: 0 }
      - { label: In Stock, name: inStock, widget: boolean, default: true }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - label: Product Discount (fallback)
        name: discount
        widget: object
        fields:
          - { label: Active, name: active, widget: boolean, default: false }
          - {
              label: Type,
              name: type,
              widget: select,
              options: [percentage, flat],
              default: percentage,
            }
          - { label: Value, name: value, widget: number, default: 0 }
          - { label: Sale Type, name: saleType, widget: string, required: false, hint: "e.g. Festival Sale, Clearance, Flash Sale" }
          - { label: Event Name, name: eventName, widget: string, required: false, hint: "e.g. Dashain Sale, Tihar Offer" }
          - { label: Start Date, name: startDate, widget: datetime, required: false }
          - { label: End Date, name: endDate, widget: datetime, required: false }
      - label: Specifications
        name: specifications
        widget: list
        required: false
        fields:
          - label: Label
            name: label
            widget: object
            fields:
              - { label: English, name: en, widget: string, hint: "e.g. Weight, Height, Material" }
              - { label: Nepali, name: ne, widget: string }
              - { label: Newari, name: newa, widget: string }
          - label: Value
            name: value
            widget: object
            fields:
              - { label: English, name: en, widget: string, hint: "e.g. 0.654 kgs, 28 cms" }
              - { label: Nepali, name: ne, widget: string }
              - { label: Newari, name: newa, widget: string }
      - label: Attribute Groups
        name: attributeGroups
        widget: list
        required: false
        fields:
          - label: Group Name
            name: name
            widget: object
            fields:
              - { label: English, name: en, widget: string, hint: "e.g. Size, Finish" }
              - { label: Nepali, name: ne, widget: string }
              - { label: Newari, name: newa, widget: string }
          - label: Options
            name: options
            widget: list
            fields:
              - label: Label
                name: label
                widget: object
                fields:
                  - { label: English, name: en, widget: string, hint: "e.g. Small, Large" }
                  - { label: Nepali, name: ne, widget: string }
                  - { label: Newari, name: newa, widget: string }
      - label: Variants
        name: variants
        widget: list
        required: false
        fields:
          - { label: Key, name: key, widget: string, hint: "Unique ID e.g. small-polished" }
          - label: Attribute Values
            name: attributeValues
            widget: list
            fields:
              - { label: Group Name, name: group, widget: string, hint: "Must match attribute group English name" }
              - { label: Option Label, name: option, widget: string, hint: "Must match option English label" }
          - { label: Price Modifier, name: priceModifier, widget: number, default: 0 }
          - label: Variant Discount
            name: discount
            widget: object
            required: false
            fields:
              - { label: Active, name: active, widget: boolean, default: false }
              - { label: Type, name: type, widget: select, options: [percentage, flat] }
              - { label: Value, name: value, widget: number, default: 0 }
              - { label: Sale Type, name: saleType, widget: string, required: false, hint: "e.g. Festival Sale, Clearance, Flash Sale" }
              - { label: Event Name, name: eventName, widget: string, required: false, hint: "e.g. Dashain Sale, Tihar Offer" }
              - { label: Start Date, name: startDate, widget: datetime, required: false }
              - { label: End Date, name: endDate, widget: datetime, required: false }
          - { label: Stock, name: stock, widget: number, min: 0, default: 0 }
          - { label: In Stock, name: inStock, widget: boolean, default: true }
          - label: Images (override product images for this variant)
            name: images
            widget: list
            required: false
            field: { name: image, widget: image }
      - label: Social Media Embeds
        name: socialEmbeds
        widget: list
        required: false
        fields:
          - {
              label: Platform,
              name: platform,
              widget: select,
              options: [facebook, instagram, tiktok],
            }
          - {
              label: Embed Code,
              name: embedCode,
              widget: text,
              hint: "Paste the official embed snippet from the post's Share option",
            }

  - name: i18n
    label: Translations
    folder: src/content/i18n
    create: true
    i18n: false
    fields:
      - {
          label: Key,
          name: key,
          widget: string,
          hint: "e.g. hero.title, products.addToCart",
        }
      - { label: English, name: en, widget: string }
      - { label: Nepali, name: ne, widget: string }
      - { label: Newari, name: newa, widget: string }

  - name: settings
    label: Site Settings
    folder: src/content/settings
    create: true
    i18n: false
    fields:
      - {
          label: WhatsApp Number (with country code,
          no + or spaces),
          name: whatsappNumber,
          widget: string,
          hint: "e.g. 9779861760709",
        }
      - {
          label: Facebook Page Username (for Messenger),
          name: messengerPage,
          widget: string,
          hint: "The username from your Facebook page URL, e.g. metalhub.np",
        }
      - { label: Business Name, name: businessName, widget: string, default: "Metal Hub" }
      - { label: Work Hours, name: workHours, widget: string, default: "9am - 8pm" }
      - { label: Store Hours, name: storeHours, widget: string, default: "Sunday to Friday, all days" }
      - { label: Store Address, name: storeAddress, widget: string, default: "Kathmandu, Nepal" }
      - { label: Google Maps Embed (iframe HTML), name: storeMapEmbed, widget: text, required: false }
      - { label: Facebook URL, name: facebookUrl, widget: string, required: false }
      - { label: Instagram URL, name: instagramUrl, widget: string, required: false }
      - { label: TikTok URL, name: tiktokUrl, widget: string, required: false }
